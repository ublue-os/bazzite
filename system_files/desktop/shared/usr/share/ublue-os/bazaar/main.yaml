yaml-blocklist-paths:
  - /usr/share/ublue-os/bazaar/blocklist.yaml
override-eol-markings:
  - com.obsproject.Studio

hooks:
  - id: jetbrains-toolbox
    when: before-transaction
    dialogs:
      - id: jetbrains-warning
        title:
          en: >-
            JetBrains IDEs are not supported in this format
          ru: >-
            IDE JetBrains не поддерживаются в данном формате
          el: >-
            Το IDE JetBrains δεν υποστηρίζεται σε αυτή τη μορφή
          fr: >-
            Les IDEs JetBrains ne sont pas pris en charge dans ce format

        # If true, render inline markup commands in body; see
        # https://docs.gtk.org/Pango/pango_markup.html
        body-use-markup: true
        body:
          en: >-
            This is a <a href="https://www.jetbrains.com/">JetBrains</a>
            application and is not officially supported on Flatpak. Bazzite
            recommends using the Toolbox app to manage JetBrains IDEs.
          ru: >-
            Это приложение <a href="https://www.jetbrains.com/">JetBrains</a>
            и оно официально не поддерживается как Flatpak. Bazzite
            рекомендует использовать Toolbox приложение для управления IDE
            JetBrains.
          el: >-
            Αυτή είναι μια εφαρμογή <a href="https://www.jetbrains.com/">JetBrains</a>
            και δεν υποστηρίζεται επίσημα σε Flatpak. Το Bazzite
            συνιστά τη χρήση της εφαρμογής Toolbox για τη διαχείριση των IDE
            JetBrains.
          fr: >-
            Ceci est une application <a href="https://www.jetbrains.com/fr-fr/">JetBrains</a>
            et n'est pas officiellement pris en charge en Flatpak. Bazzite recommande
            l'utilisation de l'appli Toolbox pour gérer les IDEs JetBrains.

        # Determines which option will be assumed if the user hits the
        # escape key or otherwise cancels the dialog
        default-response-id: cancel
        options:
          - id: cancel
            string:
              en: "Cancel"
              ru: "Отмена"
              el: "Ακύρωση"
              fr: "Annuler"
          - id: run-ujust
            string:
              en: "Download JetBrains Toolbox"
              ru: "Скачать JetBrains Toolbox"
              el: "Λήψη JetBrains Toolbox"
              fr: "Télécharger JetBrains Toolbox"
            # can be "destructive" or "suggested" or omit for no
            # styling
            style: suggested
    shell: exec python3 /usr/share/ublue-os/bazaar/hooks.py

  - id: vscode
    when: before-transaction
    dialogs:
      - id: vscode-warning
        title:
          en: >-
            Visual Studio Code is not supported in this format
          ru: >-
            Visual Studio Code не поддерживается в данном формате
          fr: >-
            Visual Studio Code n'est pas pris en charge dans ce format
          el: >-
            Το Visual Studio Code δεν υποστηρίζεται σε αυτή τη μορφή

        # If true, render inline markup commands in body; see
        # https://docs.gtk.org/Pango/pango_markup.html
        body-use-markup: true
        body:
          en: >-
            This is a <a href="https://www.microsoft.com/">Microsoft</a>
            application and is not officially supported on Flatpak. Bazzite
            recommends getting Visual Studio Code from Universal Blue's Brew
            tap.

            Alternatively, you can rebase to Bazzite DX (Developer
            Experience) which provides Docker and Visual Studio Code out
            of the box.
          ru: >-
            Это приложение <a href="https://www.microsoft.com/">Microsoft</a>
            и оно официально не поддерживается как Flatpak. Bazzite
            рекомендует устанавливать Visual Studio Code из Brew
            tap репозитория Universal Blue.

            Альтернативно, вы можете сменить систему на Bazzite DX
            (Developer Experience), которая включает в себя Docker и Visual
            Studio Code из коробки.
          fr: >-
            C'est une application <a href="https://www.microsoft.com/fr-fr">Microsoft</a>
            qui n'est pas prise en charge officiellement en Flatpak. Bazzite
            recommande l'installation de Visual Studio Code depuis le tap Brew
            d'Universal Blue.

            Vous pouvez également choisir de rebaser votre système vers Bazzite DX
            (version de Bazzite pour les devéloppeurs) qui intègre Docker et
            Visual Studio Code par défaut.
          el: >-
            Αυτή είναι μια εφαρμογή <a href="https://www.microsoft.com/">Microsoft</a>
            και δεν υποστηρίζεται επίσημα σε Flatpak. Το Bazzite
            συνιστά τη λήψη του Visual Studio Code από το Brew tap
            αποθετήριο της Universal Blue.

            Εναλλακτικά, μπορείτε να κάνετε rebase σε Bazzite DX (Developer
            Experience), που παρέχει Docker και Visual Studio Code έτοιμα
            για χρήση.

        # Determines which option will be assumed if the user hits the
        # escape key or otherwise cancels the dialog
        default-response-id: cancel
        options:
          - id: cancel
            string:
              en: "Cancel"
              ru: "Отмена"
              fr: "Annuler"
              el: "Ακύρωση"
          - id: learn-dx
            string:
              en: "Learn about Bazzite DX"
              ru: "Узнать о Bazzite DX"
              fr: "En savoir plus sur Bazzite DX"
              el: "Μάθετε για το Bazzite DX"
          - id: run-brew
            string:
              en: "Download from Brew"
              ru: "Скачать с Brew"
              fr: "Téléchargez depuis Brew"
              el: "Λήψη από Brew"
            # can be "destructive" or "suggested" or omit for no
            # styling
            style: suggested
    shell: exec python3 /usr/share/ublue-os/bazaar/hooks.py

  - id: vscodium
    when: before-transaction
    dialogs:
      - id: vscodium-warning
        title:
          en: >-
            VSCodium is not supported in this format
          ru: >-
            VSCodium не поддерживается в данном формате
          fr: >-
            VSCodium n'est pas pris en charge dans ce format
          el: >-
            Το VSCodium δεν υποστηρίζεται σε αυτή τη μορφή

        # If true, render inline markup commands in body; see
        # https://docs.gtk.org/Pango/pango_markup.html
        body-use-markup: true
        body:
          en: >-
            Although VSCodium is verified on Flathub, this is a repackaged
            <a href="https://www.microsoft.com/">Microsoft</a> application and
            is not officially supported on Flatpak. Bazzite recommends getting
            VSCodium from Universal Blue's Brew tap.
          ru: >-
            Хотя VSCodium был подтверждён в Flathub, это перепакованное
            приложение <a href="https://www.microsoft.com/">Microsoft</a> и оно
            официально не поддерживается как Flatpak. Bazzite рекомендует
            устанавливать VSCodium из Brew tap репозитория Universal Blue.
          fr: >-
            Même si VSCodium est vérifiée sur Flathub, c'est une version
            rempaquetée d'une application
            <a href="https://www.microsoft.com/fr-fr">Microsoft</a> qui n'est pas
            pris en charge officiellement en Flatpak. Bazzite recommande
            l'installation de VSCodium depuis le tap Brew d'Universal Blue.
          el: >-
            Αν και το VSCodium έχει επαληθευτεί στο Flathub, αυτή είναι μια επανασυσκευασμένη εφαρμογή
            <a href="https://www.microsoft.com/">Microsoft</a> και δεν υποστηρίζεται επίσημα σε Flatpak.
            Το Bazzite συνιστά τη λήψη του VSCodium από το Brew tap της Universal Blue.

        # Determines which option will be assumed if the user hits the
        # escape key or otherwise cancels the dialog
        default-response-id: cancel
        options:
          - id: cancel
            string:
              en: "Cancel"
              ru: "Отмена"
              fr: "Annuler"
              el: "Ακύρωση"
          - id: run-brew
            string:
              en: "Download from Brew"
              ru: "Скачать с Brew"
              fr: "Téléchargez depuis Brew"
              el: "Λήψη από Brew"
            # can be "destructive" or "suggested" or omit for no
            # styling
            style: suggested
    shell: exec python3 /usr/share/ublue-os/bazaar/hooks.py
