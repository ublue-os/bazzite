          - id: "enable"
            label: "Enable Autoupgrading DLSS"
            script: "ujust global-dlss enable"
          - id: "disable"
            label: "Disable Autoupgrading DLSS"
            script: "ujust global-dlss disable"
      - id: "global-fsr4-rdna3"
