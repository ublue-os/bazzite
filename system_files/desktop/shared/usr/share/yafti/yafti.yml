        default: false
        status_script: "ujust setup-virtual-surround status"
        options:
          - id: "enable"
            label: "Add Virtual Headphone Surround"
            script: 'ujust setup-virtual-surround enable; status=$?; echo; echo "Press Enter to close..."; read -r _; exit $status'
          - id: "disable"
