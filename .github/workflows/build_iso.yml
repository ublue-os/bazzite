# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Live ISOs

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [testing]
    paths:
      - installer/**

env:
  REPO_OWNER: ${{ github.repository_owner }}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-iso
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - bazzite
          - bazzite-nvidia
          - bazzite-nvidia-open
          - bazzite-gnome
          - bazzite-gnome-nvidia
          - bazzite-gnome-nvidia-open
    steps:
      - name: Show disk space
        run: sudo df -h

      - name: Check if /mnt is there
        id: check_mnt
        run: |
          if sudo mountpoint /mnt; then
            echo "mnt_is_there=1" >>$GITHUB_OUTPUT
          else
            echo "mnt_is_there=0" >>$GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Mount Container Storage BTRFS Loopback
        run: |
          sudo truncate -s 70G /mnt/podman-storage.img
          sudo mkfs.btrfs -f /mnt/podman-storage.img
          sudo podman system reset --force
          sudo systemctl stop podman.service
          sudo mount -o compress-force=zstd:2 /mnt/podman-storage.img /var/lib/containers/storage
          sudo systemctl start podman.service

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Set Image Tag
        id: generate-tag
        shell: bash
        run: |
          TAG="stable"

          if [[ "${{ github.ref_name }}" == "testing" ]]; then
              TAG="testing"
          elif [[ "${{ github.ref_name }}" == "unstable" ]]; then
              TAG="unstable"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set Flatpaks Directory Shortname
        id: generate-flatpak-dir-shortname
        shell: bash
        run: |
          FLATPAK_DIR_SHORTNAME="kde_flatpaks"

          if [[ "${{ matrix.image_name }}" =~ "gnome" ]]; then
            FLATPAK_DIR_SHORTNAME="gnome_flatpaks"
          fi

          echo "flatpak-dir-shortname=${FLATPAK_DIR_SHORTNAME}" >> $GITHUB_OUTPUT

      # The image registry name must be lower-case, but GitHub usernames can be capitalized.
      - name: Get lower-case equivalent of the repository owner's username
        id: repo_owner_case
        run: echo "lowercase=${REPO_OWNER,,}" >> "$GITHUB_OUTPUT"

      # - name: Setup Bazzite Repo
      #   id: setup-bazzite-repo
      #   shell: bash
      #   run: |
      #     curl -Lo ${{ github.workspace }}/bazzite.repo https://copr.fedorainfracloud.org/coprs/ublue-os/bazzite/repo/fedora-${{ matrix.major_version }}/bazzite-org-bazzite-fedora-${{ matrix.major_version }}.repo

      # We need this as we use the desktop image as the runtime for
      # the livecds.
      - name: Obtain non-deck image ref
        id: get-nondeck-ref
        run: |
          ref="${{ matrix.image_name }}"
          ref="${ref/-deck/}"
          ref="${ref/-nvidia-open/}"
          ref="${ref/-nvidia/}"
          # Handle naming mismatch: deck uses nvidia-gnome, non-deck uses gnome-nvidia
          if [[ "$ref" == "bazzite-nvidia-gnome" ]]; then
            ref="bazzite-gnome-nvidia"
          fi
          echo "ref=${ref}" >> $GITHUB_OUTPUT

      - name: Build Container Image
        run: |
          BASE_IMAGE="ghcr.io/${{ steps.repo_owner_case.outputs.lowercase }}/${{ steps.get-nondeck-ref.outputs.ref }}:${{ steps.generate-tag.outputs.tag }}"
          INSTALL_IMAGE_PAYLOAD="ghcr.io/${{ steps.repo_owner_case.outputs.lowercase }}/${{ matrix.image_name }}:${{ steps.generate-tag.outputs.tag }}"
          FLATPAK_DIR_SHORTNAME="${{ steps.generate-flatpak-dir-shortname.outputs.flatpak-dir-shortname }}"

          sudo podman build \
            --cap-add sys_admin \
            --security-opt label=disable \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg INSTALL_IMAGE_PAYLOAD="$INSTALL_IMAGE_PAYLOAD" \
            --build-arg FLATPAK_DIR_SHORTNAME="$FLATPAK_DIR_SHORTNAME" \
            -t localhost/payload:latest installer/

      - name: Build ISOs
        uses: Zeglius/titanoboa@revamp-pr
        id: build
        with:
          image-ref: localhost/payload:latest
          # TODO (@Zeglius): Remove "liveiso" prefix once this becomes the main ISO
          iso-dest: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-live-amd64.iso

      - name: Move ISOs to Upload Directory
        id: upload-directory
        shell: bash
        run: |
          ISO_UPLOAD_DIR=${{ github.workspace }}/upload
          ISO_PATH=${{ steps.build.outputs.iso-dest }}
          ISO_NAME=$(basename ${ISO_PATH})

          mkdir -p ${ISO_UPLOAD_DIR}
          mv ${ISO_PATH} ${ISO_UPLOAD_DIR}
          (cd ${ISO_UPLOAD_DIR} && sha256sum ${ISO_NAME} | tee ${ISO_NAME}-CHECKSUM)
          echo "iso-upload-dir=${ISO_UPLOAD_DIR}" >> $GITHUB_OUTPUT

      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.6.1'

      - name: Sign ISO
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_SECRET }}
          ISO_UPLOAD_DIR: ${{ steps.upload-directory.outputs.iso-upload-dir }}
        run: |
          for iso in ${ISO_UPLOAD_DIR}/*.iso; do
            cosign sign-blob -y --key env://SIGNING_KEY "$iso" --output-signature "${iso}.sig"
          done

      - name: Attest Build Provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ${{ steps.upload-directory.outputs.iso-upload-dir }}/*.iso

      - name: Generate ISO Metadata JSON
        env:
          ISO_UPLOAD_DIR: ${{ steps.upload-directory.outputs.iso-upload-dir }}
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
        run: |
          for iso in ${ISO_UPLOAD_DIR}/*.iso; do
            iso_name=$(basename "$iso")
            jq -n \
              --arg iso "$iso_name" \
              --arg url "$ATTESTATION_URL" \
              --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{iso: $iso, attestation_url: $url, build_date: $date}' > "${iso}.json"
          done

      - name: Upload ISOs and Checksum to Job Artifacts
        if: github.ref_name == 'testing' || github.ref_name == 'unstable'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.image_name }}-${{ steps.generate-tag.outputs.tag }}-${{ matrix.major_version}}
          path: ${{ steps.upload-directory.outputs.iso-upload-dir }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

      - name: Upload ISOs and Checksum to R2
        if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
        shell: bash
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SOURCE_DIR: ${{ steps.upload-directory.outputs.iso-upload-dir }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone copy $SOURCE_DIR R2:bazzite
